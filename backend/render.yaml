services:
  - type: web
    name: url-shortener-api
    env: node
    buildCommand: npm install
    startCommand: node db/migrate.js && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: worker
    name: url-shortener-worker
    env: node
    buildCommand: npm install
    startCommand: node src/workers/analyticsWorker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
